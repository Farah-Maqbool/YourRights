analyze_situation:
  description: >
    Analyze this situation from a Pakistani citizen: {situation}
    Identify: key legal issues, area of law, what they need to know.
  expected_output: >
    Brief summary: legal issues, applicable law area, key questions for law retrieval.
  agent: situation_analyzer

retrieve_laws:
  description: >
    Find the most relevant Pakistani laws for this situation.
    Return specific law names, section numbers, and what they say.
  expected_output: >
    List of relevant laws with names, section numbers, and brief description of how each applies.
  agent: law_retriever

explain_rights:
  description: >
    Using the analysis and laws retrieved, explain in simple language:
    what rights the person has, what laws protect them, and what steps they can take.
    Add a disclaimer that this is informational only.
  expected_output: >
    Three sections:
    1. Your Rights
    2. Relevant Laws
    3. Steps You Can Take
    Plus a short disclaimer.
  agent: rights_explainer